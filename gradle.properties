# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

# AGP / AndroidX
# App predates AndroidX and imports android.support.* directly.
android.useAndroidX=true

# Decompiled output uses non-final resource IDs from aapt; keep R fields non-final.
android.nonFinalResIds=true

# Run the Kotlin compiler in the Gradle JVM (avoids trying to provision a
# JetBrains JDK toolchain, which has no download for macOS aarch64).
kotlin.compiler.execution.strategy=in-process
org.gradle.java.installations.auto-download=false

# Use standard OpenJDK 21 (GraalVM jlink fails AGP 9 JdkImageTransform).
org.gradle.java.home=/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home
